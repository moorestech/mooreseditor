<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <!-- Shared dependency bridge import map.
         Plugins loaded via raw dynamic import() resolve these bare specifiers
         through this map to the host's single shared instance (served by the
         `/shared/<name>.js` bridge — `pluginFsPlugin` in dev, emitted chunks
         in prod). This guarantees host and plugins share one React/Mantine/etc.

         SYNC CONTRACT: the 9 entries below mirror 1:1 the `SHARED_DEPS`
         registry in vite-plugins/pluginFsPlugin.ts and the `EXTERNAL` array
         in plugins/node-graph/vite.config.ts. All three lists MUST stay in
         sync. The map key is the bare specifier the plugin imports; the URL
         is `/shared/<SHARED_DEPS-key>.js`. -->
    <script type="importmap">
      {
        "imports": {
          "react": "/shared/react.js",
          "react-dom": "/shared/react-dom.js",
          "react/jsx-runtime": "/shared/react-jsx-runtime.js",
          "@mantine/core": "/shared/mantine-core.js",
          "@mantine/hooks": "/shared/mantine-hooks.js",
          "@mantine/notifications": "/shared/mantine-notifications.js",
          "@tabler/icons-react": "/shared/tabler-icons-react.js",
          "@xyflow/react": "/shared/xyflow-react.js",
          "@mooreseditor/plugin-sdk": "/shared/plugin-sdk.js"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
